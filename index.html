<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Estrada Painting — Eastern North Carolina</title>
<meta name="description" content="Interior & exterior painting, pressure washing, drywall, decks in Eastern NC. Free estimates.">

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<!-- Preconnect -->
<link rel="preconnect" href="https://images.unsplash.com">
<link rel="preconnect" href="https://cdn.pixabay.com">
<link rel="preconnect" href="https://translate.google.com">

<!-- Icons -->
<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/1048/1048947.png">

<style>
body {
  margin:0;
  font-family:Inter,sans-serif;
  background:#f8fafc;
  color:#111827;
}

/* Layout */
.grid { max-width:1100px; margin:auto; padding:2rem; display:grid; gap:2rem; }
.card { background:#fff; padding:1.5rem; border-radius:14px; box-shadow:0 10px 30px rgba(0,0,0,0.08); transition:.3s; }
.card:hover { transform:translateY(-5px); }

h1,h2 { margin:0 0 1rem; }

/* Buttons */
.btn {
  display:inline-block;
  padding:12px 20px;
  border-radius:999px;
  background:#f97316;
  color:#fff;
  text-decoration:none;
  font-weight:600;
}

/* Sticky CTA */
.cta-call {
  animation:pulse 1.5s infinite;
}
@keyframes pulse {
  0%{transform:scale(1)}
  50%{transform:scale(1.05)}
  100%{transform:scale(1)}
}

/* Gallery */
img { max-width:100%; border-radius:12px; }

/* Lightbox */
#lightbox {
  position:fixed; inset:0;
  background:rgba(0,0,0,0.9);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

/* Before/After */
.ba {
  position:relative;
  overflow:hidden;
  border-radius:12px;
}
.ba img { width:100%; display:block; }
.ba .after {
  position:absolute;
  top:0; left:0;
  width:50%;
  overflow:hidden;
}
</style>
</head>

<body>

<!-- TRANSLATE -->
<div id="google_translate_element"></div>

<header class="grid">
  <h1>Estrada Painting</h1>
  <p>Interior • Exterior • Decks • Drywall • Pressure Washing</p>

  <a class="btn cta-call" href="tel:+12528767970">📞 Call Now</a>
</header>

<!-- HERO -->
<section class="grid">
  <div class="card">
    <h2>Need Painting Done Right?</h2>
    <p>Free estimates in Eastern North Carolina.</p>
    <a class="btn" href="#lead">Get Quote</a>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=1000&q=70&auto=format">
  </div>
</section>

<!-- LEAD FORM -->
<section class="grid" id="lead">
  <div class="card">
    <h2>Get Free Estimate</h2>

    <form id="quoteForm">
      <input placeholder="Name" required><br><br>
      <input id="phone" placeholder="Phone" required><br><br>
      <textarea placeholder="Project details"></textarea><br><br>
      <button class="btn" type="submit">Send via SMS</button>
    </form>
  </div>
</section>

<!-- GALLERY -->
<section class="grid">
  <h2>Recent Projects</h2>

  <img class="gallery-img" src="https://images.unsplash.com/photo-1599423300746-b62533397364?w=800&q=60&auto=format">
  <img class="gallery-img" src="https://images.unsplash.com/photo-1503387762-592deb58ef4e?w=800&q=60&auto=format">
</section>

<!-- BEFORE AFTER -->
<section class="grid">
  <h2>Before / After</h2>

  <div class="ba">
    <img src="https://images.unsplash.com/photo-1581578731548-c64695cc6952?w=900&q=60">
    <div class="after">
      <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=900&q=60">
    </div>
    <input type="range" min="0" max="100" value="50" id="slider">
  </div>
</section>

<!-- WEATHER -->
<section class="grid">
  <a class="weatherwidget-io"
     href="https://forecast7.com/en/35d23n80d84/charlotte/"
     data-label_1="CHARLOTTE"
     data-label_2="WEATHER">
    WEATHER
  </a>
</section>

<!-- PROJECT VAULT -->
<section class="grid">
  <h2>ProjectVault™</h2>

  <input id="imageURL" placeholder="Paste Unsplash/Pexels image URL">
  <button class="btn" onclick="addProject()">Add</button>

  <div id="vault"></div>
</section>

<!-- LIGHTBOX -->
<div id="lightbox"><img id="lightboxImg"></div>

<!-- EXIT POPUP -->
<div id="exitPopup" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:9999;align-items:center;justify-content:center;">
  <div class="card">
    <h2>Get Free Quote</h2>
    <a class="btn" href="tel:+12528767970">Call Now</a>
  </div>
</div>

<!-- SOUNDS -->
<audio id="clickSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3"></audio>
<audio id="successSound" src="https://cdn.pixabay.com/download/audio/2022/03/10/audio_0c1f4c1c6b.mp3"></audio>

<script>
/* TRANSLATE */
function googleTranslateElementInit(){
  new google.translate.TranslateElement({pageLanguage:'en',includedLanguages:'en,es'},'google_translate_element');
}

/* SMS FORM */
document.getElementById('quoteForm').addEventListener('submit', e=>{
  e.preventDefault();
  document.getElementById('successSound').play?.();

  const phone = document.getElementById('phone').value;
  const msg = "New lead: "+phone;

  window.location.href = "sms:+12528767970?body="+encodeURIComponent(msg);
});

/* BEFORE AFTER */
const slider = document.getElementById("slider");
const after = document.querySelector(".after");

slider.oninput = ()=> after.style.width = slider.value+"%";

/* LIGHTBOX */
document.querySelectorAll(".gallery-img").forEach(img=>{
  img.onclick=()=>{
    lightbox.style.display="flex";
    lightboxImg.src=img.src;
  };
});

lightbox.onclick=()=>lightbox.style.display="none";

/* EXIT INTENT */
let shown=false;
document.addEventListener("mouseleave",e=>{
  if(e.clientY<0&&!shown){
    exitPopup.style.display="flex";
    shown=true;
  }
});

/* PROJECT VAULT */
function addProject(){
  const url=document.getElementById("imageURL").value;
  const img=document.createElement("img");
  img.src=url;
  document.getElementById("vault").appendChild(img);
}
</script>

<script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
<script src="https://weatherwidget.io/js/widget.min.js"></script>

</body>
</html>
