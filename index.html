<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Estrada Painting — Eastern NC</title>
<meta name="description" content="Interior & exterior painting in Eastern NC. Free estimates. English & Spanish support. Call now.">

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'DM Sans',sans-serif;
  background:#f5f7fa;
  color:#1a2e4a;
}

/* NAV */
nav{
  background:#1a2e4a;
  color:white;
  padding:16px 24px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{font-family:'DM Serif Display';font-size:20px}
.nav-cta{
  background:#e8a020;
  padding:10px 18px;
  border-radius:6px;
  text-decoration:none;
  color:#0f1d2e;
  font-weight:600;
}

/* HERO */
.hero{
  padding:60px 20px;
  text-align:center;
  background:#1a2e4a;
  color:white;
}

.hero h1{
  font-family:'DM Serif Display';
  font-size:34px;
  margin-bottom:10px;
}

.hero p{
  color:#cbd5e1;
  margin-bottom:20px;
}

.btn{
  display:inline-block;
  padding:12px 22px;
  border-radius:6px;
  text-decoration:none;
  margin:6px;
  font-weight:600;
}

.primary{background:#e8a020;color:#0f1d2e}
.secondary{border:1px solid white;color:white}

/* SECTION */
.section{
  padding:40px 20px;
  max-width:900px;
  margin:auto;
}

.section h2{
  font-family:'DM Serif Display';
  margin-bottom:10px;
}

/* FORM */
.form{
  background:white;
  padding:20px;
  border-radius:10px;
  border:1px solid #d0d8e4;
}

.form input,.form textarea{
  width:100%;
  margin-bottom:10px;
  padding:10px;
  border:1px solid #ccc;
  border-radius:6px;
}

/* FLOATING TRANSLATOR BUTTON */
#translatorBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#0ea5e9;
  color:white;
  padding:12px 16px;
  border-radius:999px;
  cursor:pointer;
  font-size:14px;
  box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

/* TRANSLATOR PANEL */
#translatorPanel{
  position:fixed;
  bottom:80px;
  right:20px;
  width:320px;
  background:white;
  border-radius:14px;
  padding:12px;
  display:none;
  box-shadow:0 20px 40px rgba(0,0,0,0.2);
}

#translatorPanel textarea{
  width:100%;
  padding:8px;
}

#output{
  margin-top:8px;
  min-height:40px;
  font-size:14px;
}

/* MIC BUTTON */
#micBtn{
  margin-top:8px;
  padding:10px;
  width:100%;
  border:none;
  border-radius:8px;
  background:#f97316;
  color:white;
  font-weight:600;
  cursor:pointer;
}

/* MOBILE */
@media(max-width:600px){
  .hero h1{font-size:26px}
}
</style>
</head>

<body>

<nav>
  <div class="logo">Estrada Painting</div>
  <a class="nav-cta" href="tel:+12528767970">Call Now</a>
</nav>

<div class="hero">
  <h1>Interior & Exterior Painting in Eastern NC</h1>
  <p>Fast. Clean. Reliable. English & Spanish support.</p>
  <a class="btn primary" href="#quote">Get Free Estimate</a>
  <a class="btn secondary" href="tel:+12528767970">Call</a>
</div>

<div class="section">
  <h2>Why choose us</h2>
  <p>10+ years experience. Licensed & insured. We show up on time and finish right.</p>
</div>

<div class="section" id="quote">
  <h2>Request a quote</h2>
  <div class="form">
    <input id="name" placeholder="Name">
    <input id="phone" placeholder="Phone">
    <textarea id="details" placeholder="Project details"></textarea>
    <button class="btn primary" onclick="sendLead()">Send Request</button>
  </div>
</div>

<!-- TRANSLATOR -->
<div id="translatorBtn">🌐 Español</div>

<div id="translatorPanel">
  <textarea id="input" placeholder="Type or speak..."></textarea>
  <div id="output"></div>
  <button id="micBtn">🎤 Hold to speak</button>
</div>

<script>
// Toggle panel
const btn = document.getElementById("translatorBtn");
const panel = document.getElementById("translatorPanel");
btn.onclick = () => {
  panel.style.display = panel.style.display === "block" ? "none" : "block";
};

// Elements
const input = document.getElementById("input");
const output = document.getElementById("output");
const micBtn = document.getElementById("micBtn");

// Detect language
function detectLang(text){
  return /[áéíóúñ¿¡]/i.test(text) ? "es" : "en";
}

// Translate
async function translate(text){
  if(!text.trim()){
    output.textContent="";
    return;
  }
  const from = detectLang(text);
  const to = from==="es"?"en":"es";

  try{
    const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${from}|${to}`);
    const data = await res.json();
    const result = data.responseData.translatedText;
    output.textContent = result;
    speak(result,to);
  }catch{
    output.textContent="Translation error";
  }
}

// TTS
function speak(text,lang){
  if(!speechSynthesis) return;
  const u=new SpeechSynthesisUtterance(text);
  u.lang=lang==="es"?"es-MX":"en-US";
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

// Input typing
input.addEventListener("input",()=>{
  clearTimeout(window.t);
  window.t=setTimeout(()=>translate(input.value),400);
});

// Voice
const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
let rec,holding=false;

if(SpeechRecognition){
  rec=new SpeechRecognition();
  rec.onresult=(e)=>{
    const text=e.results[0][0].transcript;
    input.value=text;
    translate(text);
  };
  rec.onstart=()=>{
    micBtn.style.background="#dc2626";
    micBtn.textContent="Listening...";
  };
  rec.onend=()=>{
    micBtn.style.background="#f97316";
    micBtn.textContent="🎤 Hold to speak";
    holding=false;
  };
}else{
  micBtn.disabled=true;
  micBtn.textContent="Mic not supported";
}

micBtn.onmousedown=()=>{
  if(!rec||holding)return;
  holding=true;
  rec.start();
};
micBtn.onmouseup=()=>{
  if(rec)rec.stop();
};

// Lead form
function sendLead(){
  const name=document.getElementById("name").value;
  const phone=document.getElementById("phone").value;
  const details=document.getElementById("details").value;

  if(!name||!phone){
    alert("Enter name and phone");
    return;
  }

  const msg=`Quote request\nName: ${name}\nPhone: ${phone}\nDetails: ${details}`;
  window.location.href="sms:+12528767970?body="+encodeURIComponent(msg);
}
</script>

</body>
</html>
